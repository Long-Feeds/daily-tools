<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>节拍工坊 · Beat Machine</title>
<style>
/* ── UA [hidden] must always win over author display rules (site-wide trap, 2026-07-20) ── */
[hidden]{display:none!important}

:root{
  --bg:#121212; --surface:#181818; --surface2:#1f1f1f; --card:#252525; --card2:#272727;
  --text:#ffffff; --muted:#b3b3b3; --near:#cbcbcb; --dim:#7c7c7c;
  --green:#1ed760; --green2:#1db954; --green-dim:#0e5f2b;
  --neg:#f3727f; --warn:#ffa42b; --blue:#539df5;
  --border:#4d4d4d; --cell:#2b2b2b; --cell-beat:#333333;
  --font:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;
  --sh-card:rgba(0,0,0,.3) 0 8px 8px; --sh-hi:rgba(0,0,0,.5) 0 8px 24px;
  --r-pill:9999px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:16px; line-height:1.4; -webkit-font-smoothing:antialiased;
  padding:20px 16px 64px; min-height:100vh;
}
.wrap{max-width:1080px;margin:0 auto}
a{color:inherit}

/* back link */
.back{
  display:inline-flex;align-items:center;gap:6px;color:var(--muted);
  text-decoration:none;font-size:14px;font-weight:700;letter-spacing:.14px;
  padding:6px 14px;border-radius:var(--r-pill);background:var(--surface2);
  transition:color .15s,background .15s;margin-bottom:18px;
}
.back:hover{color:var(--text);background:#2a2a2a}

/* header */
header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.logo{
  width:48px;height:48px;border-radius:50%;background:var(--green);
  display:grid;place-items:center;flex:0 0 auto;box-shadow:0 0 0 6px rgba(30,215,96,.10);
}
.logo svg{width:24px;height:24px;display:block}
.htext h1{
  font-size:24px;font-weight:700;margin:0;letter-spacing:-.2px;line-height:1.1;
}
.htext p{margin:2px 0 0;color:var(--muted);font-size:14px}

/* generic card */
.card{
  background:var(--surface);border-radius:12px;padding:16px;
  box-shadow:var(--sh-card);margin-bottom:16px;
}
.card > h2{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;
  color:var(--muted);margin:0 0 14px;
}

/* transport */
.transport{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.play{
  width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
  background:var(--green);color:#000;display:grid;place-items:center;flex:0 0 auto;
  transition:transform .1s,box-shadow .15s,background .15s;box-shadow:0 6px 18px rgba(0,0,0,.5);
}
.play:hover{transform:scale(1.06);background:#1fdf64}
.play:active{transform:scale(.97)}
.play svg{width:26px;height:26px;display:block}
.play .ico-stop{display:none}
.play[data-playing="true"] .ico-play{display:none}
.play[data-playing="true"] .ico-stop{display:block}

.ctrls{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.knob{display:flex;flex-direction:column;gap:4px;min-width:120px}
.knob .k-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.knob label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted)}
.knob output{font-size:14px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.knob .unit{color:var(--muted);font-weight:400;font-size:12px}

input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;
  background:#4d4d4d;outline:none;cursor:pointer;margin:6px 0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;border:none;box-shadow:0 1px 3px rgba(0,0,0,.6);transition:background .15s,transform .1s;
}
input[type=range]:hover::-webkit-slider-thumb{background:var(--green)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none}
input[type=range].filled{background:linear-gradient(var(--green),var(--green)) 0/var(--fill,50%) 100% no-repeat,#4d4d4d}

/* pills */
.pill{
  border:none;cursor:pointer;background:var(--surface2);color:var(--near);
  padding:8px 16px;border-radius:var(--r-pill);font-family:inherit;font-size:12px;
  font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
  transition:background .15s,color .15s,transform .1s;white-space:nowrap;
}
.pill:hover{background:#2c2c2c;color:#fff}
.pill:active{transform:scale(.96)}
.pill.ghost-pill{background:transparent;border:1px solid var(--dim);color:#fff}
.pill.ghost-pill:hover{border-color:#fff;background:rgba(255,255,255,.06)}
.pill.on{background:var(--green);color:#000}
.pill.danger:hover{background:#3a2326;color:var(--neg)}

.presets{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.presets .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin-right:2px}

/* sequencer */
.seq{overflow-x:auto}
.seq-inner{min-width:640px}
.ruler{display:grid;grid-template-columns:var(--headw) 1fr;gap:14px;margin-bottom:8px}
.ruler .rl-head{}
.ruler .rl-steps{display:grid;grid-template-columns:repeat(16,1fr);gap:6px}
.ruler .rl-steps span{
  text-align:center;font-size:10px;font-weight:700;color:#6f6f6f;font-variant-numeric:tabular-nums;
  padding-bottom:2px;
}
.ruler .rl-steps span.beat{color:var(--near)}
.ruler .rl-steps span.cur{color:var(--green)}

:root{--headw:210px}
.track{
  display:grid;grid-template-columns:var(--headw) 1fr;gap:14px;align-items:center;
  padding:7px 0;border-top:1px solid rgba(255,255,255,.05);
}
.track:first-of-type{border-top:none}
.thead{display:flex;align-items:center;gap:8px}
.tname{
  background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;padding:2px 2px;text-align:left;flex:1 1 auto;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s;
}
.tname:hover{color:var(--green)}
.tname .tsub{display:block;font-size:9.5px;font-weight:400;color:var(--muted);letter-spacing:.3px;text-transform:none}
.ms{display:flex;gap:4px;flex:0 0 auto}
.ms button{
  width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;display:grid;place-items:center;
  transition:all .12s;padding:0;
}
.ms button:hover{border-color:#fff;color:#fff}
.ms .mute.active{background:var(--warn);border-color:var(--warn);color:#000}
.ms .solo.active{background:var(--green);border-color:var(--green);color:#000}
/* higher specificity than input[type=range]{width:100%} so the mini fader stays small */
input[type=range].tvol{width:48px;flex:0 0 48px;margin:0}

.steps{display:grid;grid-template-columns:repeat(16,1fr);gap:6px}
.step{
  border:none;cursor:pointer;aspect-ratio:1/1;min-height:26px;border-radius:6px;
  background:var(--cell);transition:background .08s,transform .06s,box-shadow .12s;padding:0;
  position:relative;
}
.step.dubeat{background:var(--cell-beat)}
.step:hover{background:#3a3a3a}
.step.on{background:var(--green);box-shadow:0 2px 8px rgba(30,215,96,.35)}
.step.on:hover{background:#25e668}
.step.cur:not(.on){background:rgba(30,215,96,.14)}
.step.on.cur{background:#7bf0a6;box-shadow:0 0 0 2px rgba(255,255,255,.5),0 2px 12px rgba(30,215,96,.6);transform:translateY(-1px)}
.step:focus-visible,.pill:focus-visible,.play:focus-visible,.tname:focus-visible,.ms button:focus-visible,.back:focus-visible{
  outline:2px solid var(--green);outline-offset:2px;
}

/* patterns / io */
.pcols{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:760px){.pcols{grid-template-columns:1.2fr 1fr}}
.saverow{display:flex;gap:8px;margin-bottom:12px}
.saverow input{
  flex:1 1 auto;min-width:0;background:var(--surface2);border:none;color:#fff;font-family:inherit;
  font-size:14px;padding:11px 16px;border-radius:var(--r-pill);
  box-shadow:rgb(18,18,18) 0 1px 0, rgb(124,124,124) 0 0 0 1px inset;
}
.saverow input:focus{outline:none;box-shadow:rgb(0,0,0) 0 1px 0, #fff 0 0 0 1px inset}
.saverow input::placeholder{color:var(--dim)}
#patterns-empty{color:var(--dim);font-size:13px;padding:10px 2px}
.pat-list{display:flex;flex-direction:column;gap:8px;max-height:230px;overflow-y:auto}
.pat{
  display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:8px 10px 8px 14px;
  transition:background .15s;
}
.pat:hover{background:#2a2a2a}
.pat .pinfo{flex:1 1 auto;min-width:0}
.pat .pname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat .pmeta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.pat .pat-load{
  border:none;cursor:pointer;background:var(--green);color:#000;width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;flex:0 0 auto;transition:transform .1s,background .15s;
}
.pat .pat-load:hover{transform:scale(1.08);background:#1fdf64}
.pat .pat-load svg{width:15px;height:15px}
.pat .pat-del{
  border:none;cursor:pointer;background:transparent;color:var(--muted);font-size:18px;line-height:1;
  width:28px;height:28px;border-radius:50%;flex:0 0 auto;transition:color .15s,background .15s;
}
.pat .pat-del:hover{color:var(--neg);background:rgba(243,114,127,.12)}

#io-panel{margin-top:12px}
#io-text{
  width:100%;height:130px;background:#0e0e0e;color:var(--near);border:1px solid var(--border);border-radius:8px;
  font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;padding:10px;resize:vertical;
}
.io-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

.hint{color:var(--dim);font-size:12px;margin-top:6px}
.hint kbd{
  background:var(--surface2);border-radius:4px;padding:1px 7px;font-family:inherit;font-size:11px;font-weight:700;
  box-shadow:inset 0 0 0 1px #3a3a3a;color:var(--near);
}
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);
  background:#fff;color:#000;font-size:14px;font-weight:700;padding:12px 22px;border-radius:var(--r-pill);
  box-shadow:var(--sh-hi);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:540px){
  :root{--headw:158px}
  body{padding:16px 10px 60px}
  .transport{gap:14px}
  .ctrls{gap:14px}
  .knob{min-width:100px}
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <a class="back" href="../../">← 返回工具集</a>

  <header>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 18V5l10-2v13" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="18" r="2.6" fill="#000"/><circle cx="16.5" cy="16" r="2.6" fill="#000"/></svg>
    </div>
    <div class="htext">
      <h1>节拍工坊 · Beat Machine</h1>
      <p>浏览器里的合成鼓机 —— 16 步音序器 · 8 个纯合成鼓声 · 摇摆 / 静音独奏 · 本地存节奏,零上传</p>
    </div>
  </header>

  <!-- TRANSPORT -->
  <section class="card">
    <div class="transport">
      <button class="play" id="play" data-playing="false" aria-label="播放" title="播放 / 停止 (空格)">
        <svg class="ico-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4.5v15l13-7.5z" fill="#000"/></svg>
        <svg class="ico-stop" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="1.5" fill="#000"/></svg>
      </button>
      <div class="ctrls">
        <div class="knob">
          <div class="k-top"><label for="bpm">节奏 BPM</label><output id="bpm-val">120</output></div>
          <input type="range" id="bpm" class="filled" min="50" max="220" step="1" value="120" aria-label="每分钟拍数" />
        </div>
        <div class="knob">
          <div class="k-top"><label for="swing">摇摆 Swing</label><output id="swing-val">0<span class="unit">%</span></output></div>
          <input type="range" id="swing" class="filled" min="0" max="70" step="1" value="0" aria-label="摇摆量" />
        </div>
        <div class="knob">
          <div class="k-top"><label for="master">音量 Vol</label><output id="master-val">80<span class="unit">%</span></output></div>
          <input type="range" id="master" class="filled" min="0" max="100" step="1" value="80" aria-label="主音量" />
        </div>
        <div class="knob" style="min-width:auto">
          <div class="k-top"><label>当前步 Step</label><output id="step-val">—</output></div>
          <div class="hint" style="margin:0">共 16 步 · 每 4 步一拍</div>
        </div>
      </div>
    </div>
  </section>

  <!-- SEQUENCER -->
  <section class="card">
    <h2>音序器 · Step Sequencer</h2>
    <div class="presets" style="margin-bottom:14px">
      <span class="lbl">节奏型</span>
      <button class="pill" data-preset="house">四踩 House</button>
      <button class="pill" data-preset="boombap">Boom&nbsp;Bap</button>
      <button class="pill" data-preset="rock">摇滚 Rock</button>
      <button class="pill" data-preset="techno">Techno</button>
      <button class="pill" data-preset="trap">Trap</button>
      <button class="pill" data-preset="funk">Funk</button>
      <span style="flex:1 1 8px"></span>
      <button class="pill ghost-pill" id="rand">🎲 随机</button>
      <button class="pill ghost-pill danger" id="clear">清空</button>
    </div>
    <div class="seq">
      <div class="seq-inner">
        <div class="ruler"><div class="rl-head"></div><div class="rl-steps" id="ruler"></div></div>
        <div id="grid" role="grid" aria-label="鼓机音序网格" data-playing="false" data-step="-1"></div>
      </div>
    </div>
  </section>

  <!-- PATTERNS -->
  <section class="card">
    <h2>我的节奏 · Saved Patterns</h2>
    <div class="pcols">
      <div>
        <div class="saverow">
          <input id="save-name" type="text" placeholder="给这段节奏起个名字…" maxlength="40" aria-label="节奏名称" />
          <button class="pill on" id="save-btn">保存</button>
        </div>
        <p id="patterns-empty">还没有保存的节奏。做一段你喜欢的鼓点,点「保存」它就会留在这台设备上。</p>
        <div class="pat-list" id="patterns"></div>
      </div>
      <div>
        <button class="pill ghost-pill" id="io-toggle" aria-expanded="false">导入 / 导出 JSON</button>
        <section id="io-panel" hidden>
          <textarea id="io-text" spellcheck="false" placeholder="点「导出」把节奏拷成 JSON,或粘贴 JSON 后点「导入」…"></textarea>
          <div class="io-actions">
            <button class="pill" id="io-export">导出全部</button>
            <button class="pill" id="io-import">导入</button>
            <button class="pill ghost-pill" id="io-copy">复制</button>
          </div>
        </section>
        <p class="hint" style="margin-top:12px">
          快捷键:<kbd>空格</kbd> 播放/停止 · 点击左侧鼓名试听音色 · 数据只存在你的浏览器 <code>localStorage</code>,不上传。
        </p>
      </div>
    </div>
  </section>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  var STEPS = 16;
  var TRACKS = [
    {key:'kick', name:'底鼓',   sub:'Kick'},
    {key:'snare',name:'军鼓',   sub:'Snare'},
    {key:'clap', name:'拍手',   sub:'Clap'},
    {key:'chh',  name:'闭镲',   sub:'Closed Hat'},
    {key:'ohh',  name:'开镲',   sub:'Open Hat'},
    {key:'ltom', name:'低桶鼓', sub:'Low Tom'},
    {key:'rim',  name:'边击',   sub:'Rimshot'},
    {key:'cow',  name:'牛铃',   sub:'Cowbell'}
  ];
  var NT = TRACKS.length;
  var LS_STATE = 'beat.machine.v1';
  var LS_PATS  = 'beat.machine.patterns.v1';

  function blankGrid(){ var g=[]; for(var i=0;i<NT;i++){ g.push(new Array(STEPS).fill(false)); } return g; }

  // ---- Presets (deterministic 16-step patterns; index by track order) ----
  function pat(map){ var g=blankGrid(); Object.keys(map).forEach(function(k){
      var idx=TRACKS.findIndex(function(t){return t.key===k;}); if(idx<0)return;
      map[k].forEach(function(s){ if(s>=0&&s<STEPS) g[idx][s]=true; });
    }); return g; }
  var PRESETS = {
    house:   function(){ return pat({kick:[0,4,8,12], clap:[4,12], chh:[2,6,10,14], ohh:[14]}); },
    boombap: function(){ return pat({kick:[0,3,7,10], snare:[4,12], chh:[0,2,4,6,8,10,12,14], ohh:[15]}); },
    rock:    function(){ return pat({kick:[0,8], snare:[4,12], chh:[0,2,4,6,8,10,12,14]}); },
    techno:  function(){ return pat({kick:[0,4,8,12], clap:[4,12], ohh:[2,6,10,14], chh:[0,8], cow:[7]}); },
    trap:    function(){ return pat({kick:[0,6,10], snare:[8], chh:[0,2,3,4,6,8,10,11,12,14,15]}); },
    funk:    function(){ return pat({kick:[0,3,6,10], snare:[4,12], chh:[0,2,4,6,8,10,12,14], ohh:[14], rim:[7]}); }
  };

  // ---- State ----
  var S = {
    bpm:120, swing:0, master:80, steps:STEPS,
    grid:PRESETS.house(),
    tvol:new Array(NT).fill(0.8),
    mute:new Array(NT).fill(false),
    solo:new Array(NT).fill(false),
    playing:false
  };

  // ---- Persistence ----
  function saveState(){
    try{ localStorage.setItem(LS_STATE, JSON.stringify({
      bpm:S.bpm,swing:S.swing,master:S.master,grid:S.grid,tvol:S.tvol,mute:S.mute,solo:S.solo
    })); }catch(e){}
  }
  function loadState(){
    try{
      var raw=localStorage.getItem(LS_STATE); if(!raw) return;
      var o=JSON.parse(raw); if(!o||typeof o!=='object') return;
      if(typeof o.bpm==='number') S.bpm=clamp(o.bpm,50,220);
      if(typeof o.swing==='number') S.swing=clamp(o.swing,0,70);
      if(typeof o.master==='number') S.master=clamp(o.master,0,100);
      if(Array.isArray(o.grid)&&o.grid.length===NT) S.grid=normGrid(o.grid);
      if(Array.isArray(o.tvol)&&o.tvol.length===NT) S.tvol=o.tvol.map(function(v){return clamp(+v||0,0,1);});
      if(Array.isArray(o.mute)&&o.mute.length===NT) S.mute=o.mute.map(Boolean);
      if(Array.isArray(o.solo)&&o.solo.length===NT) S.solo=o.solo.map(Boolean);
    }catch(e){}
  }
  function normGrid(g){ var out=blankGrid(); for(var i=0;i<NT;i++){ for(var s=0;s<STEPS;s++){ out[i][s]=!!(g[i]&&g[i][s]); } } return out; }
  function loadPats(){ try{ var r=localStorage.getItem(LS_PATS); var a=r?JSON.parse(r):[]; return Array.isArray(a)?a:[]; }catch(e){ return []; } }
  function savePats(a){ try{ localStorage.setItem(LS_PATS, JSON.stringify(a)); }catch(e){} }

  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

  // ---- Audio engine (all voices synthesized, no samples) ----
  var AC=null, master=null, tGain=[], noiseBuf=null, audioOK=false;
  function ensureAudio(){
    if(AC) return AC;
    try{
      var Ctx=window.AudioContext||window.webkitAudioContext;
      if(!Ctx) return null;
      AC=new Ctx();
      master=AC.createGain(); master.gain.value=S.master/100; master.connect(AC.destination);
      for(var i=0;i<NT;i++){ var g=AC.createGain(); g.gain.value=S.tvol[i]; g.connect(master); tGain.push(g); }
      // 2s white-noise buffer, reused by noise voices
      var len=Math.floor(AC.sampleRate*2), b=AC.createBuffer(1,len,AC.sampleRate), d=b.getChannelData(0);
      for(var n=0;n<len;n++){ d[n]=Math.random()*2-1; }
      noiseBuf=b; audioOK=true;
    }catch(e){ AC=null; audioOK=false; }
    return AC;
  }
  function env(gain,t,peak,dec,rel){ // simple AD envelope
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0002,peak),t+0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+dec);
    return t+dec+(rel||0.02);
  }
  function noise(t,dur){ var s=AC.createBufferSource(); s.buffer=noiseBuf;
    var off=Math.random()*1.0; s.loopStart=off; try{s.playbackRate.value=1;}catch(e){}
    s.start(t,off,dur+0.02); s.stop(t+dur+0.05); return s; }

  var VOICES={
    kick:function(out,t,v){ var o=AC.createOscillator(),g=AC.createGain();
      o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(48,t+0.11);
      env(g,t,1.0*v,0.42); o.connect(g); g.connect(out); o.start(t); o.stop(t+0.5);
      // click
      var c=noise(t,0.02),cf=AC.createBiquadFilter(),cg=AC.createGain();
      cf.type='highpass'; cf.frequency.value=2500; env(cg,t,0.5*v,0.02); c.connect(cf); cf.connect(cg); cg.connect(out);
    },
    snare:function(out,t,v){ var nz=noise(t,0.2),f=AC.createBiquadFilter(),g=AC.createGain();
      f.type='highpass'; f.frequency.value=1400; env(g,t,0.7*v,0.2); nz.connect(f); f.connect(g); g.connect(out);
      var o=AC.createOscillator(),og=AC.createGain(); o.type='triangle'; o.frequency.value=185;
      env(og,t,0.5*v,0.11); o.connect(og); og.connect(out); o.start(t); o.stop(t+0.2);
    },
    clap:function(out,t,v){ var f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1050; f.Q.value=1.1; f.connect(out);
      [0,0.011,0.022].forEach(function(d){ var nz=noise(t+d,0.03),g=AC.createGain(); env(g,t+d,0.5*v,0.03); nz.connect(g); g.connect(f); });
      var nz2=noise(t+0.03,0.18),g2=AC.createGain(); env(g2,t+0.03,0.4*v,0.18); nz2.connect(g2); g2.connect(f);
    },
    chh:function(out,t,v){ var nz=noise(t,0.045),f=AC.createBiquadFilter(),g=AC.createGain();
      f.type='highpass'; f.frequency.value=7800; env(g,t,0.42*v,0.045); nz.connect(f); f.connect(g); g.connect(out);
    },
    ohh:function(out,t,v){ var nz=noise(t,0.32),f=AC.createBiquadFilter(),g=AC.createGain();
      f.type='highpass'; f.frequency.value=7200; env(g,t,0.4*v,0.30,0.05); nz.connect(f); f.connect(g); g.connect(out);
    },
    ltom:function(out,t,v){ var o=AC.createOscillator(),g=AC.createGain(); o.type='sine';
      o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(72,t+0.18);
      env(g,t,0.8*v,0.3); o.connect(g); g.connect(out); o.start(t); o.stop(t+0.4);
    },
    rim:function(out,t,v){ var o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
      f.type='bandpass'; f.frequency.value=1700; f.Q.value=6; o.type='triangle'; o.frequency.value=1700;
      env(g,t,0.6*v,0.028); o.connect(f); f.connect(g); g.connect(out); o.start(t); o.stop(t+0.06);
    },
    cow:function(out,t,v){ var f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=850; f.Q.value=2.4; f.connect(out);
      [540,800].forEach(function(fr){ var o=AC.createOscillator(),g=AC.createGain(); o.type='square'; o.frequency.value=fr;
        env(g,t,0.32*v,0.16); o.connect(g); g.connect(f); o.start(t); o.stop(t+0.2); });
    }
  };
  function trigger(trackIdx,when,vel){
    if(!audioOK) return;
    try{ var key=TRACKS[trackIdx].key; if(VOICES[key]) VOICES[key](tGain[trackIdx],when,vel==null?1:vel); }catch(e){}
  }
  function audition(i){ var c=ensureAudio(); if(!c) return; try{ if(c.state==='suspended') c.resume(); }catch(e){} trigger(i, (AC?AC.currentTime:0)+0.01, 1); }

  // ---- Timing shared by audio + visual so they stay phase-locked ----
  function stepDurSec(step){ var base=(60/S.bpm)/4; var sr=(S.swing/100)*0.5;
    return (step%2===0)? base*(1+sr) : base*(1-sr); }

  // ---- Audio scheduler (lookahead on AudioContext clock) ----
  var schedTimer=null, schedStep=0, nextNoteTime=0;
  var LOOKAHEAD=0.1, TICK=25;
  function anySolo(){ for(var i=0;i<NT;i++){ if(S.solo[i]) return true; } return false; }
  function audible(i){ return anySolo()? S.solo[i] : !S.mute[i]; }
  function scheduleStep(step,when){ for(var i=0;i<NT;i++){ if(S.grid[i][step]&&audible(i)) trigger(i,when,1); } }
  function schedulerTick(){
    if(!AC) return;
    if(nextNoteTime < AC.currentTime) nextNoteTime = AC.currentTime + 0.02; // resync (e.g. after resume)
    while(nextNoteTime < AC.currentTime + LOOKAHEAD){
      scheduleStep(schedStep, nextNoteTime);
      nextNoteTime += stepDurSec(schedStep);
      schedStep = (schedStep+1)%STEPS;
    }
  }

  // ---- Visual playhead (performance.now → advances even with a suspended AudioContext) ----
  var rafId=null, perfStart=0, visStep=-1, visBoundary=0;
  function nowMs(){ return (window.performance&&performance.now)?performance.now():Date.now(); }
  function highlight(step){
    var cells=grid.querySelectorAll('.step');
    for(var k=0;k<cells.length;k++){ cells[k].classList.toggle('cur', +cells[k].dataset.step===step); }
    var rs=ruler.children; for(var r=0;r<rs.length;r++){ rs[r].classList.toggle('cur', r===step); }
    grid.dataset.step=step;
    stepVal.textContent = step<0? '—' : (step+1);
    visStep=step;
  }
  function drawTick(){
    if(!S.playing) return;
    var now=nowMs(), guard=0;
    while(now>=visBoundary && guard++<STEPS*2){
      var nx=(visStep+1)%STEPS;
      highlight(nx);
      visBoundary += stepDurSec(nx)*1000;
    }
    rafId=requestAnimationFrame(drawTick);
  }

  // ---- Transport ----
  function play(){
    if(S.playing) return;
    S.playing=true;
    var c=ensureAudio();
    if(c){ try{ if(c.state==='suspended') c.resume().catch(function(){}); }catch(e){}
      schedStep=0; nextNoteTime=c.currentTime+0.05; schedTimer=setInterval(schedulerTick,TICK); schedulerTick(); }
    // visual
    visStep=0; perfStart=nowMs(); visBoundary=perfStart+stepDurSec(0)*1000; highlight(0);
    rafId=requestAnimationFrame(drawTick);
    playBtn.dataset.playing='true'; playBtn.setAttribute('aria-label','停止'); grid.dataset.playing='true';
  }
  function stop(){
    S.playing=false;
    if(schedTimer){ clearInterval(schedTimer); schedTimer=null; }
    if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
    highlight(-1);
    playBtn.dataset.playing='false'; playBtn.setAttribute('aria-label','播放'); grid.dataset.playing='false';
  }
  function togglePlay(){ S.playing? stop() : play(); }

  // ---- DOM refs ----
  var grid=document.getElementById('grid');
  var ruler=document.getElementById('ruler');
  var playBtn=document.getElementById('play');
  var stepVal=document.getElementById('step-val');
  var toastEl=document.getElementById('toast');

  // ---- Build ruler + grid ----
  function buildRuler(){ ruler.innerHTML='';
    for(var s=0;s<STEPS;s++){ var sp=document.createElement('span'); sp.textContent=(s+1);
      if(s%4===0) sp.className='beat'; ruler.appendChild(sp); } }
  function buildGrid(){
    grid.innerHTML='';
    TRACKS.forEach(function(t,i){
      var row=document.createElement('div'); row.className='track'; row.setAttribute('role','row');
      var head=document.createElement('div'); head.className='thead';
      var name=document.createElement('button'); name.className='tname'; name.type='button';
      name.innerHTML='<span>'+t.name+'</span><span class="tsub">'+t.sub+'</span>';
      name.title='试听 '+t.name; name.setAttribute('data-track',i);
      name.addEventListener('click',function(){ audition(i); });
      var ms=document.createElement('div'); ms.className='ms';
      var mute=document.createElement('button'); mute.className='mute'; mute.type='button'; mute.textContent='M';
      mute.setAttribute('data-track',i); mute.setAttribute('aria-label',t.name+' 静音'); mute.setAttribute('aria-pressed','false');
      mute.addEventListener('click',function(){ S.mute[i]=!S.mute[i]; mute.classList.toggle('active',S.mute[i]);
        mute.setAttribute('aria-pressed',S.mute[i]?'true':'false'); saveState(); });
      var solo=document.createElement('button'); solo.className='solo'; solo.type='button'; solo.textContent='S';
      solo.setAttribute('data-track',i); solo.setAttribute('aria-label',t.name+' 独奏'); solo.setAttribute('aria-pressed','false');
      solo.addEventListener('click',function(){ S.solo[i]=!S.solo[i]; solo.classList.toggle('active',S.solo[i]);
        solo.setAttribute('aria-pressed',S.solo[i]?'true':'false'); saveState(); });
      ms.appendChild(mute); ms.appendChild(solo);
      var vol=document.createElement('input'); vol.type='range'; vol.className='tvol'; vol.min=0; vol.max=100; vol.step=1;
      vol.value=Math.round(S.tvol[i]*100); vol.setAttribute('data-track',i); vol.setAttribute('aria-label',t.name+' 音量');
      vol.addEventListener('input',function(){ S.tvol[i]=(+vol.value)/100; if(tGain[i]) tGain[i].gain.value=S.tvol[i]; saveState(); });
      head.appendChild(name); head.appendChild(ms); head.appendChild(vol);

      var steps=document.createElement('div'); steps.className='steps';
      for(var s=0;s<STEPS;s++){
        var cell=document.createElement('button'); cell.type='button'; cell.className='step'+(s%4===0?' dubeat':'');
        cell.setAttribute('data-track',i); cell.setAttribute('data-step',s);
        cell.setAttribute('role','gridcell'); cell.setAttribute('aria-label',t.name+' 第'+(s+1)+'步');
        cell.setAttribute('aria-pressed', S.grid[i][s]?'true':'false');
        if(S.grid[i][s]) cell.classList.add('on');
        cell.addEventListener('click',(function(ti,si,el){ return function(){
          S.grid[ti][si]=!S.grid[ti][si];
          el.classList.toggle('on',S.grid[ti][si]);
          el.setAttribute('aria-pressed',S.grid[ti][si]?'true':'false');
          if(S.grid[ti][si]) audition(ti);
          saveState();
        };})(i,s,cell));
        steps.appendChild(cell);
      }
      row.appendChild(head); row.appendChild(steps);
      grid.appendChild(row);
    });
  }
  // Re-paint cell "on" states from S.grid (after preset/load/clear) without rebuilding DOM
  function repaintGrid(){
    var cells=grid.querySelectorAll('.step');
    for(var k=0;k<cells.length;k++){ var c=cells[k], ti=+c.dataset.track, si=+c.dataset.step, on=!!S.grid[ti][si];
      c.classList.toggle('on',on); c.setAttribute('aria-pressed',on?'true':'false'); }
  }
  function repaintControls(){
    document.querySelectorAll('.ms .mute').forEach(function(b){ var i=+b.dataset.track; b.classList.toggle('active',S.mute[i]); b.setAttribute('aria-pressed',S.mute[i]?'true':'false'); });
    document.querySelectorAll('.ms .solo').forEach(function(b){ var i=+b.dataset.track; b.classList.toggle('active',S.solo[i]); b.setAttribute('aria-pressed',S.solo[i]?'true':'false'); });
    document.querySelectorAll('.tvol').forEach(function(v){ var i=+v.dataset.track; v.value=Math.round(S.tvol[i]*100); });
  }

  // ---- Controls: sliders ----
  var bpm=document.getElementById('bpm'), bpmVal=document.getElementById('bpm-val');
  var swing=document.getElementById('swing'), swingVal=document.getElementById('swing-val');
  var masterEl=document.getElementById('master'), masterVal=document.getElementById('master-val');
  function fill(el){ var mn=+el.min,mx=+el.max,v=+el.value; el.style.setProperty('--fill',((v-mn)/(mx-mn)*100)+'%'); }
  function syncSliders(){ bpm.value=S.bpm; swing.value=S.swing; masterEl.value=S.master;
    bpmVal.textContent=S.bpm; swingVal.innerHTML=S.swing+'<span class="unit">%</span>'; masterVal.innerHTML=S.master+'<span class="unit">%</span>';
    fill(bpm); fill(swing); fill(masterEl); }
  bpm.addEventListener('input',function(){ S.bpm=clamp(+bpm.value,50,220); bpmVal.textContent=S.bpm; fill(bpm); saveState(); });
  swing.addEventListener('input',function(){ S.swing=clamp(+swing.value,0,70); swingVal.innerHTML=S.swing+'<span class="unit">%</span>'; fill(swing); saveState(); });
  masterEl.addEventListener('input',function(){ S.master=clamp(+masterEl.value,0,100); masterVal.innerHTML=S.master+'<span class="unit">%</span>'; fill(masterEl); if(master) master.gain.value=S.master/100; saveState(); });

  // ---- Presets / randomize / clear ----
  document.querySelectorAll('.pill[data-preset]').forEach(function(b){
    b.addEventListener('click',function(){ var p=PRESETS[b.dataset.preset]; if(!p) return; S.grid=p(); repaintGrid(); saveState(); toast('已载入:'+b.textContent.trim()); });
  });
  document.getElementById('clear').addEventListener('click',function(){ S.grid=blankGrid(); repaintGrid(); saveState(); toast('已清空'); });
  document.getElementById('rand').addEventListener('click',function(){ S.grid=randomGrid(); repaintGrid(); saveState(); toast('随机节奏 🎲'); });
  function randomGrid(){
    var g=blankGrid();
    var ki=idx('kick'), si=idx('snare'), ci=idx('clap'), hi=idx('chh'), oi=idx('ohh');
    g[ki][0]=true; // never empty
    for(var s=0;s<STEPS;s++){
      if(s%4===0 && Math.random()<0.85) g[ki][s]=true;
      else if(Math.random()<0.10) g[ki][s]=true;
      if((s===4||s===12) && Math.random()<0.8) g[si]?g[si][s]=true:0;
      if(s%2===0 && Math.random()<0.55) g[hi][s]=true;
      if(s%4===2 && Math.random()<0.35) g[oi][s]=true;
      if(s%8===7 && Math.random()<0.4) g[ci]?g[ci][s]=true:0;
    }
    return g;
  }
  function idx(k){ return TRACKS.findIndex(function(t){return t.key===k;}); }

  // ---- Patterns (save / load / delete) ----
  var saveName=document.getElementById('save-name');
  var patternsEl=document.getElementById('patterns');
  var emptyEl=document.getElementById('patterns-empty');
  function countOn(g){ var n=0; for(var i=0;i<NT;i++){ for(var s=0;s<STEPS;s++){ if(g[i][s]) n++; } } return n; }
  function renderPats(){
    var list=loadPats();
    emptyEl.hidden = list.length>0;
    patternsEl.innerHTML='';
    list.forEach(function(p){
      var el=document.createElement('div'); el.className='pat'; el.setAttribute('data-id',p.id);
      var info=document.createElement('div'); info.className='pinfo';
      var nm=document.createElement('div'); nm.className='pname'; nm.textContent=p.name;
      var mt=document.createElement('div'); mt.className='pmeta'; mt.textContent=p.bpm+' BPM · '+countOn(p.grid)+' 音符'+(p.swing?(' · 摆'+p.swing+'%'):'');
      info.appendChild(nm); info.appendChild(mt);
      var load=document.createElement('button'); load.className='pat-load'; load.type='button'; load.setAttribute('aria-label','载入 '+p.name);
      load.innerHTML='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4.5v15l13-7.5z" fill="#000"/></svg>';
      load.addEventListener('click',function(){ applyPattern(p); toast('已载入:'+p.name); });
      var del=document.createElement('button'); del.className='pat-del'; del.type='button'; del.setAttribute('aria-label','删除 '+p.name); del.textContent='×';
      del.addEventListener('click',function(){ var a=loadPats().filter(function(x){return x.id!==p.id;}); savePats(a); renderPats(); toast('已删除'); });
      el.appendChild(info); el.appendChild(load); el.appendChild(del);
      patternsEl.appendChild(el);
    });
  }
  function applyPattern(p){
    if(Array.isArray(p.grid)&&p.grid.length===NT) S.grid=normGrid(p.grid);
    if(typeof p.bpm==='number') S.bpm=clamp(p.bpm,50,220);
    if(typeof p.swing==='number') S.swing=clamp(p.swing,0,70);
    if(Array.isArray(p.tvol)&&p.tvol.length===NT) S.tvol=p.tvol.map(function(v){return clamp(+v||0,0,1);});
    if(Array.isArray(p.mute)&&p.mute.length===NT) S.mute=p.mute.map(Boolean);
    if(Array.isArray(p.solo)&&p.solo.length===NT) S.solo=p.solo.map(Boolean);
    repaintGrid(); repaintControls(); syncSliders(); saveState();
  }
  function newId(){ return 'p'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
  document.getElementById('save-btn').addEventListener('click',function(){
    var name=(saveName.value||'').trim(); if(!name){ name='节奏 '+(loadPats().length+1); }
    var list=loadPats();
    list.unshift({ id:newId(), name:name, bpm:S.bpm, swing:S.swing,
      grid:S.grid.map(function(r){return r.slice();}), tvol:S.tvol.slice(), mute:S.mute.slice(), solo:S.solo.slice() });
    savePats(list); saveName.value=''; renderPats(); toast('已保存:'+name);
  });
  saveName.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('save-btn').click(); } });

  // ---- Import / export ----
  var ioPanel=document.getElementById('io-panel'), ioText=document.getElementById('io-text'), ioToggle=document.getElementById('io-toggle');
  ioToggle.addEventListener('click',function(){ var show=ioPanel.hidden; ioPanel.hidden=!show; ioToggle.setAttribute('aria-expanded',show?'true':'false'); });
  document.getElementById('io-export').addEventListener('click',function(){
    var out={ version:1, exportedAt:new Date().toISOString(),
      current:{ name:'当前', bpm:S.bpm, swing:S.swing, grid:S.grid, tvol:S.tvol, mute:S.mute, solo:S.solo },
      patterns:loadPats() };
    ioText.value=JSON.stringify(out,null,2); toast('已导出到文本框');
  });
  document.getElementById('io-import').addEventListener('click',function(){
    try{
      var o=JSON.parse(ioText.value); var incoming=[];
      if(o&&Array.isArray(o.patterns)) incoming=o.patterns;
      else if(Array.isArray(o)) incoming=o;
      else if(o&&o.grid) incoming=[o];
      var clean=incoming.filter(function(p){return p&&Array.isArray(p.grid)&&p.grid.length===NT;})
        .map(function(p){ return { id:p.id||newId(), name:p.name||'导入节奏', bpm:clamp(+p.bpm||120,50,220), swing:clamp(+p.swing||0,0,70),
          grid:normGrid(p.grid), tvol:Array.isArray(p.tvol)?p.tvol:S.tvol.slice(), mute:Array.isArray(p.mute)?p.mute:[], solo:Array.isArray(p.solo)?p.solo:[] }; });
      if(!clean.length){ toast('没有可导入的节奏'); return; }
      var list=clean.concat(loadPats()); savePats(list); renderPats(); toast('已导入 '+clean.length+' 段节奏');
      if(o&&o.current&&o.current.grid) applyPattern(o.current);
    }catch(e){ toast('JSON 解析失败'); }
  });
  document.getElementById('io-copy').addEventListener('click',function(){
    ioText.select(); try{ navigator.clipboard.writeText(ioText.value); }catch(e){ try{document.execCommand('copy');}catch(_){}} toast('已复制');
  });

  // ---- keyboard ----
  document.addEventListener('keydown',function(e){
    var t=e.target, tag=t&&t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA') return;
    if(e.code==='Space'||e.key===' '){ e.preventDefault(); togglePlay(); }
  });
  playBtn.addEventListener('click',togglePlay);

  // ---- toast ----
  var toastT=null;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
    if(toastT) clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.classList.remove('show'); },1600); }

  // ---- boot ----
  loadState();
  buildRuler(); buildGrid(); repaintControls(); syncSliders(); renderPats();

  // ---- test hook ----
  window.__beat={
    S:S, PRESETS:PRESETS, TRACKS:TRACKS, STEPS:STEPS,
    getStep:function(){ return visStep; },
    isPlaying:function(){ return S.playing; },
    stepDurSec:stepDurSec,
    onCount:function(){ return countOn(S.grid); },
    trackOn:function(i){ var a=[]; for(var s=0;s<STEPS;s++){ if(S.grid[i][s]) a.push(s); } return a; },
    idx:idx, audioOK:function(){ return audioOK; }
  };
})();
</script>
</body>
</html>
