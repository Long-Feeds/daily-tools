<style>
:root{
  --bg:#0b0d12; --card:#161a24; --card2:#12151d; --border:#242a37; --text:#e7ebf3;
  --muted:#8b94a7; --accent:#6ea8fe; --accent2:#9d7bff; --ok:#5fd28b; --err:#ff7a8a; --warn:#ffb454; --radius:14px;
  --shadow:0 8px 30px rgba(0,0,0,.35); --code-bg:#0e1118;
}
@media (prefers-color-scheme:light){
  :root{--bg:#f6f8fc;--card:#fff;--card2:#eef2f9;--border:#e2e8f2;--text:#1a2030;--muted:#5d6577;
    --accent:#2f6bff;--accent2:#7a4fe0;--ok:#1c9e5e;--err:#d6455a;--warn:#c77818;--shadow:0 8px 30px rgba(40,60,110,.10);--code-bg:#f3f5fb;}
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:radial-gradient(1100px 520px at 85% -10%,rgba(157,123,255,.12),transparent 60%),
   radial-gradient(820px 460px at -8% 0%,rgba(110,168,254,.10),transparent 55%),var(--bg);color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft Yahei",Roboto,Arial,sans-serif;min-height:100vh;}
.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 80px;}
.back{color:var(--muted);text-decoration:none;font-size:14px;}
.back:hover{color:var(--accent);}
header h1{font-size:27px;margin:14px 0 4px;letter-spacing:-.02em;}
header p{color:var(--muted);margin:0 0 6px;font-size:14.5px;max-width:820px;}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;margin-top:18px;box-shadow:var(--shadow);}
.tb-group{display:flex;gap:4px;padding-right:8px;margin-right:2px;border-right:1px solid var(--border);}
.tb-group:last-of-type{border-right:none;}
.tbtn{min-width:34px;height:34px;padding:0 8px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);
  cursor:pointer;font:600 13px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;display:inline-flex;align-items:center;justify-content:center;transition:.13s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn:active{transform:translateY(1px);}
.tbtn.it{font-style:italic;} .tbtn.bd{font-weight:800;} .tbtn.st{text-decoration:line-through;}
.spacer{flex:1 1 auto;}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card2);}
.seg button{padding:0 12px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;font:600 13px sans-serif;transition:.13s;}
.seg button[aria-pressed=true]{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.seg button:not([aria-pressed=true]):hover{color:var(--text);}
.act{height:34px;padding:0 12px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:13px;transition:.13s;white-space:nowrap;}
.act:hover{border-color:var(--accent);color:var(--accent);}
.act.primary{border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.act.warn{border-color:var(--warn);color:var(--warn);}

/* app */
.app{display:grid;gap:16px;margin-top:16px;}
.app[data-view="split"]{grid-template-columns:1fr 1fr;}
.app[data-view="edit"],.app[data-view="preview"]{grid-template-columns:1fr;}
.app[data-view="edit"] .preview-pane{display:none;}
.app[data-view="preview"] .editor-pane{display:none;}
@media (max-width:860px){.app[data-view="split"]{grid-template-columns:1fr;}}
.pane{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.pane-head{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;
  text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.pane-head .ttl{font-weight:700;}
.pane-head .sub{text-transform:none;letter-spacing:0;}
.pane-head .grow{flex:1;}
#save-status{text-transform:none;letter-spacing:0;font-size:12px;color:var(--muted);}
#save-status.saved{color:var(--ok);}
.preview-pane{position:relative;}
#md-input{flex:1;border:none;background:transparent;color:var(--text);resize:none;padding:16px 18px;height:64vh;overflow:auto;
  font:14px/1.75 ui-monospace,SFMono-Regular,Menlo,Consolas,"PingFang SC",monospace;outline:none;tab-size:2;}
#preview{flex:1;position:relative;overflow:auto;padding:18px 22px;height:64vh;}
.app[data-view="edit"] #md-input,.app[data-view="preview"] #preview{height:70vh;}
#preview:empty::before{content:"预览会显示在这里 —— 在左边开始写 Markdown ✍️";color:var(--muted);font-size:14px;}

/* toc */
.toc-btn{border:1px solid var(--border);background:var(--card2);color:var(--muted);border-radius:8px;height:26px;padding:0 10px;
  cursor:pointer;font-size:12px;text-transform:none;letter-spacing:0;transition:.13s;}
.toc-btn:hover{color:var(--accent);border-color:var(--accent);}
#toc{position:absolute;top:44px;right:12px;width:248px;max-height:60%;overflow:auto;background:var(--card);border:1px solid var(--border);
  border-radius:12px;box-shadow:var(--shadow);padding:6px;z-index:20;display:none;}
#toc.open{display:block;}
.toc-item{display:block;padding:6px 10px;border-radius:7px;color:var(--text);text-decoration:none;font-size:13px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toc-item:hover{background:var(--card2);color:var(--accent);}
.toc-empty{padding:10px;color:var(--muted);font-size:13px;}

/* stats */
.statusbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:11px 16px;margin-top:16px;box-shadow:var(--shadow);font-size:13px;color:var(--muted);}
.stat{display:inline-flex;align-items:baseline;gap:6px;}
.stat b{color:var(--text);font:700 15px ui-monospace,monospace;letter-spacing:.01em;}
.statusbar .dot{opacity:.4;}
.statusbar .tip{margin-left:auto;font-size:12px;opacity:.85;}

/* markdown preview body */
.markdown-body{font-size:15px;line-height:1.7;word-wrap:break-word;}
.markdown-body>:first-child{margin-top:0;}
.markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{
  margin:1.4em 0 .55em;line-height:1.3;letter-spacing:-.01em;font-weight:700;scroll-margin-top:10px;}
.markdown-body h1{font-size:1.7em;border-bottom:1px solid var(--border);padding-bottom:.28em;}
.markdown-body h2{font-size:1.4em;border-bottom:1px solid var(--border);padding-bottom:.22em;}
.markdown-body h3{font-size:1.2em;} .markdown-body h4{font-size:1.05em;}
.markdown-body h5{font-size:.95em;} .markdown-body h6{font-size:.88em;color:var(--muted);}
.markdown-body p{margin:.7em 0;}
.markdown-body a{color:var(--accent);text-decoration:none;}
.markdown-body a:hover{text-decoration:underline;}
.markdown-body strong{font-weight:700;} .markdown-body em{font-style:italic;}
.markdown-body del{opacity:.7;}
.markdown-body code{background:var(--code-bg);border:1px solid var(--border);border-radius:5px;padding:.13em .4em;
  font:.88em ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
.markdown-body pre{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;overflow:auto;margin:.9em 0;}
.markdown-body pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.6;display:block;}
.markdown-body blockquote{margin:.9em 0;padding:.2em 1em;border-left:3px solid var(--accent);color:var(--muted);background:var(--card2);border-radius:0 8px 8px 0;}
.markdown-body blockquote>:first-child{margin-top:.4em;} .markdown-body blockquote>:last-child{margin-bottom:.4em;}
.markdown-body ul,.markdown-body ol{margin:.6em 0;padding-left:1.6em;}
.markdown-body li{margin:.28em 0;}
.markdown-body li.task-item{list-style:none;margin-left:-1.4em;padding-left:0;}
.markdown-body li.task-item input{margin-right:.5em;vertical-align:middle;}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:1.4em 0;}
.markdown-body img{max-width:100%;border-radius:8px;}
.markdown-body table{border-collapse:collapse;width:auto;max-width:100%;margin:.9em 0;display:block;overflow:auto;}
.markdown-body th,.markdown-body td{border:1px solid var(--border);padding:7px 12px;text-align:left;}
.markdown-body th{background:var(--card2);font-weight:700;}
.markdown-body tr:nth-child(even) td{background:rgba(127,127,127,.04);}
.err{color:var(--err);}

#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);
  padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.2s;z-index:60;box-shadow:var(--shadow);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.kbd{font:600 11px ui-monospace,monospace;background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:1px 5px;}
</style>
</head>

      <button class="act" id="act-sample">载入示例</button>

<script type="text/plain" id="sample-md">
# Markdown 工作台 ✍️

**实时预览**你的想法 —— 左边写 Markdown，右边立刻成型。支持*斜体*、`行内代码`、~~删除线~~ 以及 [超链接](https://www.anthropic.com)。

## 为什么好用

- 工具栏一键插入格式，或用 `⌘/Ctrl + B`、`⌘/Ctrl + I` 快捷键
- 自动统计字数、字符与预计阅读时长
- 右上角「大纲」按标题快速跳转
- 内容自动保存在浏览器本地，刷新不丢

### 待办清单

- [ ] 导出成 HTML 发布

## 代码也没问题

```js
function greet(name) {
  return `Hello, ${name}!`;
}
greet("Markdown");
```

> 提示：把表格、引用、列表混着用，预览都会忠实还原。

| 功能 | 快捷键 |
| --- | :---: |
| 加粗 | ⌘/Ctrl + B |
| 斜体 | ⌘/Ctrl + I |
| 链接 | ⌘/Ctrl + K |

---

写完了就用底部按钮 **复制 HTML** 或 **下载 .md**，随时带走。

<script>
(function(){
  "use strict";
  var ta = document.getElementById('md-input');
  var preview = document.getElementById('preview');
  var app = document.getElementById('app');
  var saveStatus = document.getElementById('save-status');
  var tocEl = document.getElementById('toc');
  var tocToggle = document.getElementById('toc-toggle');
  var toastEl = document.getElementById('toast');
  var stWords = document.getElementById('stat-words');
  var stChars = document.getElementById('stat-chars');
  var stLines = document.getElementById('stat-lines');
  var stRead = document.getElementById('stat-read');
  var KEY = 'dt_markdown_editor_v1';
  var VIEWKEY = 'dt_markdown_editor_view_v1';
  var CJK = /[㐀-鿿぀-ヿ가-힯豈-﫿、-〿＀-￯]/g;

  /* ---------- Markdown -> HTML (self-contained, escapes by default) ---------- */
  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function safeUrl(u, isImg){
    u = (u||'').trim();
    if(/^\s*(javascript|vbscript):/i.test(u)) return '#';
    if(/^\s*data:/i.test(u)) return (isImg && /^\s*data:image\//i.test(u)) ? u : '#';
    return u; // http/https/mailto/tel/relative/anchor — already HTML-escaped upstream
  }
  function emphasis(s){
    return s
      .replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>')
      .replace(/__([^_]+?)__/g, '<strong>$1</strong>')
      .replace(/(^|[^\\*])\*([^\s*][^*]*?)\*/g, '$1<em>$2</em>')
      .replace(/(^|[^\\_A-Za-z0-9])_([^\s_][^_]*?)_/g, '$1<em>$2</em>')
      .replace(/~~([^~]+?)~~/g, '<del>$1</del>');
  }
  function inline(text){
    var s = esc(text);
    var tokens = [];
    var stash = function(html){ tokens.push(html); return '@@MD' + (tokens.length - 1) + '@@'; };
    // inline code (`` or `)
    s = s.replace(/``([^`]+?)``|`([^`]+?)`/g, function(m,a,b){ return stash('<code>' + (a != null ? a : b) + '</code>'); });
    // images
    s = s.replace(/!\[([^\]]*)\]\(\s*([^)\s]+)(?:\s+&quot;([^)]*?)&quot;)?\s*\)/g, function(m,alt,src,title){
      return stash('<img src="' + safeUrl(src,true) + '" alt="' + alt + '"' + (title ? ' title="'+title+'"' : '') + ' loading="lazy">');
    });
    // links
    s = s.replace(/\[([^\]]+)\]\(\s*([^)\s]+)(?:\s+&quot;([^)]*?)&quot;)?\s*\)/g, function(m,txt,href,title){
      return stash('<a href="' + safeUrl(href,false) + '" target="_blank" rel="noopener noreferrer"' + (title ? ' title="'+title+'"' : '') + '>' + emphasis(txt) + '</a>');
    });
    s = emphasis(s);
    var pass = 0;
    while(/@@MD\d+@@/.test(s) && pass++ < 6){
      s = s.replace(/@@MD(\d+)@@/g, function(m,i){ return tokens[+i] != null ? tokens[+i] : m; });
    }
    return s;
  }
  function splitRow(l){
    return l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|');
  }
  function listMatch(l){
    var m = l.match(/^(\s*)([-*+])\s+(.*)$/);
    if(m) return { indent: m[1].length, ordered: false, text: m[3] };
    m = l.match(/^(\s*)(\d+)[.)]\s+(.*)$/);
    if(m) return { indent: m[1].length, ordered: true, text: m[3] };
    return null;
  }
  function blockStart(l){
    return /^(#{1,6})\s+/.test(l) || /^\s*>\s?/.test(l) || /^\s*(`{3,}|~{3,})/.test(l)
        || /^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(l) || /^\s*\|/.test(l) || listMatch(l) != null;
  }
  function renderItem(text, child){
    var cls = '', prefix = '';
    var tm = text.match(/^\[([ xX])\]\s+/);
    if(tm){
      var checked = tm[1].toLowerCase() === 'x';
      cls = ' class="task-item"';
      prefix = '<input type="checkbox" disabled' + (checked ? ' checked' : '') + '> ';
      text = text.slice(tm[0].length);
    }
    var body = text.split('\n').map(function(x){ return inline(x); }).join('<br>');
    return '<li' + cls + '>' + prefix + body + (child || '') + '</li>';
  }
  function renderList(buf){
    var items = [];
    buf.forEach(function(line){
      var m = listMatch(line);
      if(m) items.push(m);
      else if(items.length) items[items.length-1].text += '\n' + line.trim();
    });
    if(!items.length) return '';
    var pos = 0;
    function parseLevel(indent){
      var nodes = [], ordered = false;
      while(pos < items.length && items[pos].indent >= indent){
        if(items[pos].indent > indent) break; // safety
        var it = items[pos]; ordered = it.ordered; pos++;
        var child = null;
        if(pos < items.length && items[pos].indent > indent) child = parseLevel(items[pos].indent);
        nodes.push({ text: it.text, child: child });
      }
      var tag = ordered ? 'ol' : 'ul';
      return '<' + tag + '>' + nodes.map(function(n){ return renderItem(n.text, n.child); }).join('') + '</' + tag + '>';
    }
    return parseLevel(items[0].indent);
  }
  function renderMarkdown(src){
    var lines = String(src).replace(/\r\n?/g,'\n').split('\n');
    var out = [], i = 0, hcount = 0;
    var isBlank = function(l){ return /^\s*$/.test(l); };
    while(i < lines.length){
      var l = lines[i];
      if(isBlank(l)){ i++; continue; }
      // fenced code
      var f = l.match(/^(\s*)(`{3,}|~{3,})\s*([\w+-]*)\s*$/);
      if(f){
        var ch = f[2][0], len = f[2].length, lang = f[3] || '', buf = [];
        var closer = new RegExp('^\\s*\\' + ch + '{' + len + ',}\\s*$');
        i++;
        while(i < lines.length && !closer.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;
        out.push('<pre><code' + (lang ? ' class="language-' + esc(lang) + '"' : '') + '>' + esc(buf.join('\n')) + '</code></pre>');
        continue;
      }
      // heading
      var h = l.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if(h){
        out.push('<h' + h[1].length + ' id="h-' + hcount + '">' + inline(h[2]) + '</h' + h[1].length + '>');
        hcount++; i++; continue;
      }
      // horizontal rule
      if(/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(l)){ out.push('<hr>'); i++; continue; }
      // blockquote
      if(/^\s*>\s?/.test(l)){
        var qbuf = [];
        while(i < lines.length && /^\s*>\s?/.test(lines[i])){ qbuf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
        out.push('<blockquote>' + renderMarkdown(qbuf.join('\n')) + '</blockquote>');
        continue;
      }
      // table (GFM pipe)
      if(l.indexOf('|') >= 0 && i+1 < lines.length && /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(lines[i+1])){
        var head = splitRow(l);
        var aligns = splitRow(lines[i+1]).map(function(c){
          var t = c.trim(), L = t.charAt(0) === ':', R = t.charAt(t.length-1) === ':';
          return (L && R) ? 'center' : R ? 'right' : L ? 'left' : '';
        });
        i += 2;
        var rows = [];
        while(i < lines.length && lines[i].indexOf('|') >= 0 && !isBlank(lines[i])){ rows.push(splitRow(lines[i])); i++; }
        var th = head.map(function(c,j){ return '<th' + (aligns[j] ? ' style="text-align:'+aligns[j]+'"' : '') + '>' + inline(c.trim()) + '</th>'; }).join('');
        var tb = rows.map(function(r){
          return '<tr>' + head.map(function(_,j){ return '<td' + (aligns[j] ? ' style="text-align:'+aligns[j]+'"' : '') + '>' + inline((r[j]||'').trim()) + '</td>'; }).join('') + '</tr>';
        }).join('');
        out.push('<table><thead><tr>' + th + '</tr></thead>' + (tb ? '<tbody>' + tb + '</tbody>' : '') + '</table>');
        continue;
      }
      // list
      if(listMatch(l)){
        var lbuf = [];
        while(i < lines.length && !isBlank(lines[i]) && (listMatch(lines[i]) || (/^\s+\S/.test(lines[i]) && lbuf.length))){ lbuf.push(lines[i]); i++; }
        out.push(renderList(lbuf));
        continue;
      }
      // paragraph
      var pbuf = [];
      while(i < lines.length && !isBlank(lines[i]) && !blockStart(lines[i])){ pbuf.push(lines[i]); i++; }
      out.push('<p>' + pbuf.map(function(x){ return inline(x.replace(/ {2,}$/,'')); }).join('<br>') + '</p>');
    }
    return out.join('\n');
  }
  function extractToc(src){
    var lines = String(src).replace(/\r\n?/g,'\n').split('\n');
    var toc = [], inFence = false, fch = '', n = 0;
    for(var k=0;k<lines.length;k++){
      var l = lines[k];
      var f = l.match(/^\s*(`{3,}|~{3,})/);
      if(f){ if(!inFence){ inFence = true; fch = f[1][0]; } else if(l.trim().charAt(0) === fch){ inFence = false; } continue; }
      if(inFence) continue;
      var h = l.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if(h){ toc.push({ lvl: h[1].length, id: 'h-' + n, text: h[2].replace(/[*_`~]/g,'').trim() }); n++; }
    }
    return toc;
  }

  /* ---------- view / preview pipeline ---------- */
  function buildToc(){
    var toc = extractToc(ta.value);
    if(!toc.length){ tocEl.innerHTML = '<div class="toc-empty">还没有标题</div>'; return; }
    tocEl.innerHTML = toc.map(function(t){
      return '<a class="toc-item" data-target="' + t.id + '" style="padding-left:' + ((t.lvl-1)*14+10) + 'px">' + (esc(t.text) || '(无标题)') + '</a>';
    }).join('');
  }
  function updateStats(v){
    var cjk = (v.match(CJK) || []).length;
    var latin = (v.replace(CJK,' ').match(/[A-Za-z0-9][A-Za-z0-9'’\-]*/g) || []).length;
    var words = cjk + latin;
    stWords.textContent = words;
    stChars.textContent = v.length;
    stLines.textContent = v === '' ? 0 : v.split('\n').length;
    stRead.textContent = words === 0 ? '0 分钟' : (Math.max(1, Math.round(words/250)) + ' 分钟');
  }
  function update(){
    var v = ta.value;
    var html = '';
    try { html = renderMarkdown(v); }
    catch(e){ html = '<p class="err">预览渲染出错:' + esc(e.message || String(e)) + '</p>'; }
    preview.innerHTML = html;
    buildToc();
    updateStats(v);
    scheduleSave();
  }

  /* ---------- autosave ---------- */
  var saveTimer = null;
  function pad(n){ return (n<10?'0':'') + n; }
  function nowStr(){ var d = new Date(); return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
  function scheduleSave(){
    clearTimeout(saveTimer);
    saveStatus.textContent = '编辑中…';
    saveStatus.className = '';
    saveTimer = setTimeout(function(){
      try { localStorage.setItem(KEY, ta.value); } catch(e){}
      saveStatus.textContent = '已保存 · ' + nowStr();
      saveStatus.className = 'saved';
    }, 400);
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 1600);
  }

  /* ---------- editor insertions ---------- */
  function refocus(){ ta.focus(); update(); }
  function insertInline(before, after, ph){
    var s = ta.selectionStart, e = ta.selectionEnd, v = ta.value, sel = v.slice(s,e) || ph;
    ta.value = v.slice(0,s) + before + sel + after + v.slice(e);
    ta.selectionStart = s + before.length;
    ta.selectionEnd = s + before.length + sel.length;
    refocus();
  }
  function linePrefix(p){
    var v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    var ls = v.lastIndexOf('\n', s-1) + 1, le = v.indexOf('\n', e); if(le < 0) le = v.length;
    var nb = v.slice(ls,le).split('\n').map(function(l){ return p + l; }).join('\n');
    ta.value = v.slice(0,ls) + nb + v.slice(le);
    ta.selectionStart = ls; ta.selectionEnd = ls + nb.length;
    refocus();
  }
  function orderedList(){
    var v = ta.value, s = ta.selectionStart, e = ta.selectionEnd;
    var ls = v.lastIndexOf('\n', s-1) + 1, le = v.indexOf('\n', e); if(le < 0) le = v.length;
    var nb = v.slice(ls,le).split('\n').map(function(l,idx){ return (idx+1) + '. ' + l; }).join('\n');
    ta.value = v.slice(0,ls) + nb + v.slice(le);
    ta.selectionStart = ls; ta.selectionEnd = ls + nb.length;
    refocus();
  }
  function heading(n){
    var v = ta.value, s = ta.selectionStart;
    var ls = v.lastIndexOf('\n', s-1) + 1, le = v.indexOf('\n', s); if(le < 0) le = v.length;
    var line = v.slice(ls,le).replace(/^#{1,6}\s+/, '');
    var nl = new Array(n+1).join('#') + ' ' + line;
    ta.value = v.slice(0,ls) + nl + v.slice(le);
    ta.selectionStart = ta.selectionEnd = ls + nl.length;
    refocus();
  }
  function codeblock(){
    var s = ta.selectionStart, e = ta.selectionEnd, v = ta.value, sel = v.slice(s,e) || 'code';
    var txt = '```\n' + sel + '\n```';
    ta.value = v.slice(0,s) + txt + v.slice(e);
    ta.selectionStart = s + 4; ta.selectionEnd = s + 4 + sel.length;
    refocus();
  }
  function insertBlock(t){
    var s = ta.selectionStart, v = ta.value;
    var pre = (s > 0 && v[s-1] !== '\n') ? '\n' : '';
    ta.value = v.slice(0,s) + pre + t + v.slice(s);
    ta.selectionStart = ta.selectionEnd = s + pre.length + t.length;
    refocus();
  }
  function doAction(name){
    switch(name){
      case 'bold': return insertInline('**','**','粗体');
      case 'italic': return insertInline('*','*','斜体');
      case 'strike': return insertInline('~~','~~','删除线');
      case 'code': return insertInline('`','`','代码');
      case 'h1': return heading(1);
      case 'h2': return heading(2);
      case 'h3': return heading(3);
      case 'quote': return linePrefix('> ');
      case 'ul': return linePrefix('- ');
      case 'ol': return orderedList();
      case 'task': return linePrefix('- [ ] ');
      case 'codeblock': return codeblock();
      case 'link': return insertInline('[','](https://)','链接文字');
      case 'image': return insertInline('![','](https://)','图片说明');
      case 'table': return insertBlock('| 列1 | 列2 |\n| --- | --- |\n| 单元 | 单元 |\n');
      case 'hr': return insertBlock('---\n');
    }
  }

  /* ---------- export ---------- */
  function copyText(text, label){
    var done = function(){ toast(label + ' 已复制到剪贴板'); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
    } else { fallbackCopy(text); done(); }
  }
  function fallbackCopy(text){
    try {
      var t = document.createElement('textarea');
      t.value = text; t.style.position = 'fixed'; t.style.opacity = '0';
      document.body.appendChild(t); t.focus(); t.select();
      document.execCommand('copy'); document.body.removeChild(t);
    } catch(e){}
  }
  function download(filename, content, mime){
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
  }
  function standaloneHtml(){
    var title = (ta.value.match(/^#\s+(.+)$/m) || [,'Markdown 文档'])[1].replace(/[*_`~]/g,'').trim();
    return '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n' +
      '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>' + esc(title) + '</title>\n<style>\n' +
      'body{max-width:760px;margin:40px auto;padding:0 20px;font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",Roboto,sans-serif;color:#1a2030;}\n' +
      'h1,h2,h3,h4{line-height:1.3;margin:1.4em 0 .5em;} h1,h2{border-bottom:1px solid #e2e8f2;padding-bottom:.2em;}\n' +
      'a{color:#2f6bff;} code{background:#f3f5fb;border:1px solid #e2e8f2;border-radius:5px;padding:.13em .4em;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.9em;}\n' +
      'pre{background:#f3f5fb;border:1px solid #e2e8f2;border-radius:10px;padding:14px 16px;overflow:auto;} pre code{background:none;border:none;padding:0;}\n' +
      'blockquote{margin:1em 0;padding:.2em 1em;border-left:3px solid #2f6bff;color:#5d6577;background:#f6f8fc;}\n' +
      'table{border-collapse:collapse;} th,td{border:1px solid #e2e8f2;padding:7px 12px;} th{background:#eef2f9;}\n' +
      'img{max-width:100%;} hr{border:none;border-top:1px solid #e2e8f2;margin:1.5em 0;}\n' +
      'li.task-item{list-style:none;margin-left:-1.2em;}\n</style>\n</head>\n<body class="markdown-body">\n' +
      preview.innerHTML + '\n</body>\n</html>\n';
  }

  /* ---------- view switching ---------- */
  function setView(v){
    app.setAttribute('data-view', v);
    document.querySelectorAll('.view-btn').forEach(function(b){ b.setAttribute('aria-pressed', String(b.dataset.view === v)); });
    try { localStorage.setItem(VIEWKEY, v); } catch(e){}
  }

  /* ---------- clear (two-step confirm, no native dialog) ---------- */
  var clearBtn = document.getElementById('act-clear');
  var clearArmed = false, clearTimer = null;
  function resetClear(){ clearArmed = false; clearBtn.textContent = '清空'; clearBtn.classList.remove('warn'); }
  clearBtn.addEventListener('click', function(){
    if(!clearArmed){
      clearArmed = true; clearBtn.textContent = '确认清空?'; clearBtn.classList.add('warn');
      clearTimer = setTimeout(resetClear, 3000);
      return;
    }
    clearTimeout(clearTimer); resetClear();
    ta.value = ''; ta.focus(); update();
    toast('已清空');
  });

  /* ---------- wire up ---------- */
  document.getElementById('toolbar').addEventListener('click', function(e){
    var btn = e.target.closest('.tbtn'); if(!btn) return;
    doAction(btn.dataset.md);
  });
  document.querySelectorAll('.view-btn').forEach(function(b){
    b.addEventListener('click', function(){ setView(b.dataset.view); });
  });
  ta.addEventListener('input', update);
  ta.addEventListener('keydown', function(e){
    if(!(e.metaKey || e.ctrlKey)) return;
    var k = e.key.toLowerCase();
    if(k === 'b'){ e.preventDefault(); doAction('bold'); }
    else if(k === 'i'){ e.preventDefault(); doAction('italic'); }
    else if(k === 'k'){ e.preventDefault(); doAction('link'); }
  });
  tocToggle.addEventListener('click', function(){
    var open = tocEl.classList.toggle('open');
    tocToggle.setAttribute('aria-expanded', String(open));
  });
  tocEl.addEventListener('click', function(e){
    var it = e.target.closest('.toc-item'); if(!it) return;
    var el = document.getElementById(it.dataset.target);
    if(el) preview.scrollTop = el.offsetTop - 8;
    tocEl.classList.remove('open');
    tocToggle.setAttribute('aria-expanded', 'false');
  });
  // one-way scroll sync editor -> preview
  var syncing = false;
  ta.addEventListener('scroll', function(){
    if(syncing) return;
    syncing = true;
    var de = ta.scrollHeight - ta.clientHeight;
    var dp = preview.scrollHeight - preview.clientHeight;
    if(de > 0 && dp > 0) preview.scrollTop = (ta.scrollTop / de) * dp;
    requestAnimationFrame(function(){ syncing = false; });
  });
  document.getElementById('act-sample').addEventListener('click', function(){
    ta.value = SAMPLE; update(); toast('已载入示例'); ta.focus();
  });
  document.getElementById('act-copy-md').addEventListener('click', function(){ copyText(ta.value, 'Markdown'); });
  document.getElementById('act-copy-html').addEventListener('click', function(){ copyText(preview.innerHTML, 'HTML'); });
  document.getElementById('act-dl-md').addEventListener('click', function(){ download('document.md', ta.value, 'text/markdown;charset=utf-8'); toast('已下载 document.md'); });
  document.getElementById('act-dl-html').addEventListener('click', function(){ download('document.html', standaloneHtml(), 'text/html;charset=utf-8'); toast('已下载 document.html'); });
  document.addEventListener('click', function(e){
    if(clearArmed && !e.target.closest('#act-clear')) resetClear();
    if(tocEl.classList.contains('open') && !e.target.closest('#toc') && !e.target.closest('#toc-toggle')){
      tocEl.classList.remove('open'); tocToggle.setAttribute('aria-expanded','false');
    }
  });

  /* ---------- boot ---------- */
  var SAMPLE = (document.getElementById('sample-md').textContent || '').replace(/^\n+/, '').replace(/\s+$/, '');
  var savedView = null, saved = null;
  try { savedView = localStorage.getItem(VIEWKEY); } catch(e){}
  try { saved = localStorage.getItem(KEY); } catch(e){}
  setView(savedView || 'split');
  ta.value = (saved != null) ? saved : SAMPLE;
  update();
})();
</script>
</body>
</html>
